name: Auto Sync with Upstream

on:
  schedule:
    # Runs every day at midnight UTC
    - cron: '0 0 * * *'
  # This line allows you to manually trigger the workflow from the Actions tab
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync with upstream ComfyUI
        run: |
          # Setup git config
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add the original ComfyUI repo as upstream
          git remote add upstream https://github.com/comfyanonymous/ComfyUI.git
          git fetch upstream
          
          # Merge upstream's master branch into your fork's master branch
          git checkout master
          git merge upstream/master --no-edit
          
          # Push the updated code back to your fork
          git push origin master
